# Reduce output energy around the office room mode at 128 Hz.
# Tune Gain/Q here if the notch is too weak or too audible.

context.modules = [
  {
    name = libpipewire-module-filter-chain

    args = {
      node.description = "Office Output Notch 128Hz"
      media.name = "Office Output Notch 128Hz"

      filter.graph = {
        nodes = [
          {
            type = builtin
            name = notch_128
            label = bq_peaking
            control = {
              "Freq" = 128.0
              "Q" = 8.0
              "Gain" = -10.0
            }
          }
        ]
      }

      capture.props = {
        node.name = "effect_input.office_output_notch_128hz"
        node.description = "Office Output Notch 128Hz"
        media.class = Audio/Sink

        audio.channels = 2
        audio.position = [ FL FR ]

        filter.smart = true
        filter.smart.name = "office_output_notch_128hz"
      }

      playback.props = {
        node.name = "effect_output.office_output_notch_128hz"
        node.passive = true

        audio.channels = 2
        audio.position = [ FL FR ]
        stream.dont-remix = true
      }
    }
  }
]
