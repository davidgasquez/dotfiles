# Voxtype configuration (https://github.com/peteonrails/voxtype)

state_file = "auto"

engine = "whisper"

[hotkey]
enabled = false
mode = "toggle"

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 60

[audio.feedback]
enabled = true
theme = "default"
volume = 0.7

[whisper]
model = "large-v3-turbo"
language = "en"
translate = false
on_demand_loading = false
context_window_optimization = false

[output]
mode = "clipboard"
fallback_to_clipboard = true
type_delay_ms = 0
pre_type_delay_ms = 0

[output.notification]
on_recording_start = false
on_recording_stop = false
on_transcription = true
urgency = "normal"

[text]
spoken_punctuation = false
filter_filler_words = true
smart_auto_submit = false

[status]
icon_theme = "emoji"
