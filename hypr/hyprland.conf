# Hyprland Configuration

# Monitors - https://wiki.hyprland.org/Configuring/Monitors/
source=~/.config/hypr/monitor.conf

# Autostart Applications
exec-once = uwsm app -- nm-applet
exec-once = [workspace 3 silent] uwsm app -- slack
exec-once = [workspace 10 silent] uwsm app -- spotify

# Clipboard Manager
exec-once = uwsm app -- wl-clip-persist --clipboard regular
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# Theme
source=~/.config/hypr/frappe.conf

# Programs
$terminal = ghostty +new-window
$fileManager = thunar
$menu = fuzzel
$editor = zeditor

# Inputs - https://wiki.hyprland.org/Configuring/Variables/#input
input {
    numlock_by_default = true
    kb_layout = es

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
}

# Permissions
# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

# General - https://wiki.hyprland.org/Configuring/Variables/
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3
    col.active_border = $blue $green 90deg
    col.inactive_border = $crust
    layout = dwindle
}

# Ecosystem - https://wiki.hyprland.org/Configuring/Permissions/
ecosystem {
    no_update_news = true
}

# XWayland - https://wiki.hyprland.org/Configuring/XWayland/
xwayland {
  force_zero_scaling = true
}

# Decorations - https://wiki.hyprland.org/Configuring/Variables/
decoration {
    rounding = 0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

# Animations - https://wiki.hyprland.org/Configuring/Animations/
animations {
    enabled = yes

    animation = windows, 1, 5, default, popin
    animation = fade, 1, 5, default
    animation = border, 1, 10, default
    animation = borderangle, 1, 10, default
    animation = workspaces, 1, 5, default
}

# Dwindle - https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    preserve_split = yes
    force_split = 2
}

# Smart Gaps - https://wiki.hyprland.org/Configuring/Workspace-Rules/
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = match:workspace w[tv1], match:float no, border_size 0
windowrule = match:workspace w[tv1], match:float no, rounding 0
windowrule = match:workspace f[1], match:float no, border_size 0
windowrule = match:workspace f[1], match:float no, rounding 0

# Misc - https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = false
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Cursor - https://wiki.hyprland.org/Configuring/Variables/#cursor
env = HYPRCURSOR_THEME,catppuccin-frappe-light-cursors
env = HYPRCURSOR_SIZE,24

# Keywords - https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER

# Binds - https://wiki.hyprland.org/Configuring/Binds/
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, M, submap, EXIT
bind = $mainMod, E, exec, uwsm app -- $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, BackSpace, exec, uwsm app -- $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , PRINT, exec, hyprshot -m output
bind = SHIFT, PRINT, exec, hyprshot -m region
bind = $mainMod shift, p, exec, hyprshot -m region
bind = CTRL, PRINT, exec, hyprshot -m window

# Open Editor Projects
bind = $mainMod shift, BackSpace, exec, ls "$HOME/projects" | fuzzel -x 20 -d -I --prompt="🖥️ > " | xargs -I {} uwsm app -- $editor -n "$HOME/projects/{}"

# Open AI Agent in Project
bind = $mainMod shift, minus, exec, open-ai-agent

# Pi
bind = $mainMod SHIFT, I, exec, pi-sandbox

# AI
bind = $mainMod SHIFT, A, exec, uwsm app -- brave --app=https://chatgpt.com

# Todoist
bind = $mainMod SHIFT, T, exec, uwsm app -- brave --app=https://app.todoist.com/app/today

# Brave Browser
bind = $mainMod SHIFT, B, exec, uwsm app -- brave

# Open Common Projects
bind = $mainMod SHIFT, n, exec, uwsm app -- $editor -n "$HOME/projects/notes"
bind = $mainMod SHIFT, m, exec, uwsm app -- $editor -n "$HOME/projects/personal"
bind = $mainMod SHIFT, d, exec, uwsm app -- $editor -n "$HOME/projects/dotfiles"
bind = $mainMod SHIFT, h, exec, uwsm app -- $editor -n "$HOME/projects/handbook"

# Emoji
bind = $mainMod SHIFT, E, exec, uwsm app -- bemoji -n

# Voxtype
bind = $mainMod SHIFT, O, exec, voxtype record toggle

# Volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Multimedia Control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screen
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Ignore maximize requests from apps
windowrule = match:class .*, suppress_event maximize

# Resize mode
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 40 0
binde = , left, resizeactive, -40 0
binde = , up, resizeactive, 0 -40
binde = , down, resizeactive, 0 40
binde = , l, resizeactive, 40 0
binde = , h, resizeactive, -40 0
binde = , k, resizeactive, 0 -40
binde = , j, resizeactive, 0 40
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Exit mode
bind = $mainMod shift, l, submap, EXIT
submap = EXIT
bind = , l, exec, loginctl lock-session
bind = , l, submap, reset
bind = , s, exec, systemctl suspend
bind = , s, submap, reset
bind = , q, exec, uwsm stop
bind = , r, exec, systemctl reboot
bind = , p, exec, systemctl poweroff -i
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset
